<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" width="120" height="130">
  <!-- ЮФЛД logo — geometric Y shape in green -->
  <!-- Left diagonal arm (top-left → center) -->
  <polygon points="0,0 28,0 62,58 34,58" fill="#3db82e"/>
  <!-- Right diagonal arm (top-right → center, thinner, angled) -->
  <polygon points="120,0 96,0 62,58 76,58" fill="#3db82e"/>
  <!-- Stem (center → bottom) -->
  <polygon points="34,58 76,58 76,130 34,130" fill="#3db82e"/>
</svg>
