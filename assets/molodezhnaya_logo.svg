<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110" width="140" height="110">
  <!-- Молодёжная лига logo — stylised M, left=green, right=navy -->
  <!-- Green left half of M -->
  <polygon points="0,0 32,0 32,110 0,110" fill="#00c800"/>
  <polygon points="32,0 70,55 70,110 32,110" fill="#00c800"/>
  <!-- Navy right half of M -->
  <polygon points="70,55 108,0 140,0 140,110 108,110" fill="#1a1464"/>
  <polygon points="70,55 108,110 70,110" fill="#1a1464"/>
</svg>
